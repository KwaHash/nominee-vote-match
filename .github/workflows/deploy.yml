name: Deploy Nominee-Vote-Match Application

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify required build secrets
        run: |
          missing=0
          for key in \
            NEXT_PUBLIC_HOST \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            SUPABASE_SERVICE_ROLE_KEY \
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are empty. A missing NEXT_SERVER_ACTIONS_ENCRYPTION_KEY makes next build generate a random key and breaks Server Actions in prod."
            exit 1
          fi
        env:
          NEXT_PUBLIC_HOST: ${{ secrets.NEXT_PUBLIC_HOST }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_HOST: ${{ secrets.NEXT_PUBLIC_HOST }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          rm -rf deploy/.next/cache   # webpack cache is unused by `next start`; shipping it only adds bloat/risk
          cp -r public deploy/
          cp -r app deploy/
          cp -r components deploy/
          cp -r features deploy/
          cp -r hooks deploy/
          cp -r lib deploy/
          cp -r providers deploy/
          cp -r stores deploy/
          cp -r styles deploy/
          cp -r types deploy/
          cp -r utils deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.mjs deploy/
          cp tsconfig.json deploy/
          cp tailwind.config.ts deploy/
          cp postcss.config.mjs deploy/
          cp components.json deploy/
          cp middleware.ts deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /var/www/nominee-vote-match

            # Match the CI build's Node major (22) at runtime. Building on 22 and
            # running on 20 is a source of subtle build/runtime skew (and the
            # @supabase deprecation warning).
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22 >/dev/null 2>&1 || true
            echo "Using Node $(node -v)"

            # Extract into a clean staging dir on the SAME filesystem as the app,
            # never over the live tree. A partial/interrupted extract on top of
            # the running .next is exactly what produces a mixed build -- page
            # bundles from build A, action manifest from build B -- which fails
            # every Server Action call with "Failed to find Server Action".
            STAGE=/var/www/.nvm-release
            rm -rf "$STAGE" && mkdir -p "$STAGE"
            echo "Extracting new deployment to staging..."
            tar -xzf /tmp/deploy.tar.gz -C "$STAGE"

            # Atomically swap .next so the runtime only ever sees one whole build.
            echo "Swapping in new .next build..."
            rm -rf .next.old
            [ -d .next ] && mv .next .next.old
            mv "$STAGE/.next" .next

            # Sync the rest of the app tree (source dirs are read at build time
            # only, but keep them current for parity/debugging).
            for d in public app components features hooks lib providers stores styles types utils; do
              [ -d "$STAGE/$d" ] && { rm -rf "$d"; cp -r "$STAGE/$d" "$d"; }
            done
            for f in package.json package-lock.json next.config.mjs tsconfig.json tailwind.config.ts postcss.config.mjs components.json middleware.ts; do
              [ -f "$STAGE/$f" ] && cp -f "$STAGE/$f" "$f"
            done

            # Install production dependencies
            echo "Installing dependencies..."
            npm ci --omit=dev

            # Gate: refuse to serve a mixed build. The supporters/list action id
            # registered in the manifest must also exist in that page's bundle.
            echo "Verifying build consistency..."
            MID=$(grep -oE '[0-9a-f]{40}":\{"workers":\{"app/\(main\)/supporters/list' .next/server/server-reference-manifest.json | grep -oE '^[0-9a-f]{40}' | head -1 || true)
            if [ -n "$MID" ] && ! grep -q "$MID" ".next/server/app/(main)/supporters/list/page.js"; then
              echo "::error::Mixed build detected (manifest action id $MID missing from page bundle). Rolling back."
              rm -rf .next && [ -d .next.old ] && mv .next.old .next
              exit 1
            fi

            # Restart as a single fork-mode instance. Delete first so no stale
            # process keeps an old in-memory action manifest and we never double-run.
            echo "Restarting PM2 application..."
            pm2 delete nominee-vote-match-app 2>/dev/null || true
            pm2 start npm --name "nominee-vote-match-app" -- start
            pm2 save

            # Cleanup
            rm -rf "$STAGE" .next.old
            rm -f /tmp/deploy.tar.gz

            echo "Deployment completed successfully!"

      - name: Cleanup
        if: always()
        run: |
          rm -rf deploy deploy.tar.gz

